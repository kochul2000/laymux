<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laymux Remote</title>
    <link rel="stylesheet" href="/remote/vendor/xterm.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg-base: #1e1e2e;
        --bg-surface: #181825;
        --bg-overlay: #313244;
        --text-primary: #cdd6f4;
        --text-secondary: #a6adc8;
        --accent: #89b4fa;
        --accent-50: rgba(137, 180, 250, 0.5);
        --accent-20: rgba(137, 180, 250, 0.2);
        --accent-12: rgba(137, 180, 250, 0.12);
        --accent-08: rgba(137, 180, 250, 0.08);
        --green: #a6e3a1;
        --red: #f38ba8;
        --yellow: #f9e2af;
        --border: #313244;
        --hover-bg: rgba(255, 255, 255, 0.06);
        --active-bg: rgba(255, 255, 255, 0.04);
        --backdrop-light: rgba(0, 0, 0, 0.3);
        --terminal-bg: #0c0c0c;
        --bg: var(--bg-base);
        --panel: var(--bg-surface);
        --panel-2: var(--bg-overlay);
        --text: var(--text-primary);
        --muted: var(--text-secondary);
        --accent-strong: #6c8fd8;
        --danger: var(--red);
        --danger-bg: rgba(243, 139, 168, 0.18);
        --radius-sm: 2px;
        --radius-md: 3px;
        --radius-lg: 6px;
        --fs-xs: 10px;
        --fs-sm: 11px;
        --fs-md: 13px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font: var(--fs-md)/1.45 "Consolas", "Fira Code", monospace;
        overflow: hidden;
      }
      button, input, select {
        font: inherit;
      }
      .app {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        height: 100%;
      }
      header, footer {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 6px 8px;
        border-color: var(--border);
        background: var(--panel);
      }
      header {
        border-bottom: 1px solid var(--border);
        flex-wrap: nowrap;
      }
      footer {
        border-top: 1px solid var(--border);
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
      }
      input, select {
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 5px 7px;
        background: var(--bg-base);
        color: var(--text);
      }
      input[type="password"] {
        width: 100%;
      }
      button {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 5px 9px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
      }
      button.primary {
        border-color: #3d7dd1;
        background: var(--accent-strong);
      }
      button.danger {
        border-color: #8b3440;
        background: var(--danger-bg);
      }
      button:disabled {
        cursor: default;
        opacity: 0.55;
      }
      main {
        position: relative;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        min-height: 0;
      }
      .status {
        flex: 1 1 auto;
        min-width: 0;
        padding: 0;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status.error {
        color: var(--danger);
      }
      .terminal-shell {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        width: 100%;
        height: 100%;
        padding: 6px;
        background: var(--terminal-bg);
      }
      .remote-body {
        position: relative;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }
      .navigation-panel {
        position: absolute;
        inset: 0 auto 0 0;
        z-index: 20;
        width: min(360px, calc(100vw - 28px));
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: auto;
        padding: 0;
        border-right: 1px solid var(--border);
        background: var(--bg-surface);
        box-shadow: 12px 0 32px rgba(0, 0, 0, 0.38);
        transform: translateX(-104%);
        transition: transform 140ms ease;
      }
      .app.nav-open .navigation-panel {
        transform: translateX(0);
      }
      .nav-scrim {
        position: absolute;
        inset: 0;
        z-index: 10;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: var(--backdrop-light);
      }
      [hidden] {
        display: none !important;
      }
      .menu-button,
      .drawer-close,
      .desktop-mode-button {
        width: 28px;
        height: 24px;
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-color: transparent;
        background: transparent;
      }
      .menu-button:hover,
      .drawer-close:hover,
      .desktop-mode-button:hover {
        background: var(--hover-bg);
      }
      .desktop-mode-button {
        width: auto;
        min-width: 34px;
        padding: 0 8px;
        color: var(--accent);
        font-size: var(--fs-sm);
        font-weight: 650;
      }
      .menu-button {
        flex-direction: column;
        gap: 3px;
      }
      .menu-button span {
        width: 14px;
        height: 1px;
        border-radius: 1px;
        background: var(--text-primary);
      }
      .drawer-close {
        position: relative;
      }
      .drawer-close span {
        position: absolute;
        width: 13px;
        height: 1px;
        border-radius: 1px;
        background: var(--text-secondary);
      }
      .drawer-close span:first-child {
        transform: rotate(45deg);
      }
      .drawer-close span:last-child {
        transform: rotate(-45deg);
      }
      .drawer-header {
        height: 28px;
        display: flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: space-between;
        padding: 0 6px 0 9px;
        border-bottom: 1px solid var(--border);
      }
      .drawer-title {
        color: var(--text-primary);
        font-size: var(--fs-md);
        font-weight: 650;
      }
      .drawer-header-actions {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        gap: 4px;
      }
      .connection-title {
        color: var(--text-secondary);
        font-size: var(--fs-xs);
        font-weight: 500;
        letter-spacing: 0.04em;
        opacity: 0.72;
        text-transform: uppercase;
      }
      .connection-panel {
        display: grid;
        gap: 7px;
        padding: 8px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.015);
      }
      .connection-panel:not(.connected) {
        background: var(--accent-08);
      }
      .connection-panel.attention {
        background: rgba(243, 139, 168, 0.1);
      }
      .connection-panel.connected {
        grid-template-columns: 1fr;
        background: rgba(255, 255, 255, 0.015);
      }
      .connection-panel label {
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr);
        gap: 7px;
        color: var(--text-secondary);
        font-size: var(--fs-sm);
      }
      .connection-panel.connected label {
        display: none;
      }
      .connection-hint {
        color: var(--accent);
        font-size: var(--fs-sm);
        line-height: 1.35;
        opacity: 0.9;
      }
      .connection-panel.connected .connection-hint {
        display: none;
      }
      .connection-panel.attention .connection-hint {
        color: var(--danger);
        font-weight: 700;
      }
      .connection-panel input {
        width: 100%;
      }
      .connection-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .connection-panel.connected .connection-actions {
        grid-template-columns: 1fr 1fr;
      }
      .connection-panel.connected #connect {
        display: none;
      }
      .connection-actions button {
        min-width: 0;
        padding-left: 6px;
        padding-right: 6px;
      }
      .nav-section + .nav-section {
        margin-top: 0;
      }
      .nav-section-title {
        margin: 0;
        padding: 7px 8px 5px;
        color: var(--muted);
        font-size: var(--fs-xs);
        font-weight: 500;
        letter-spacing: 0.04em;
        opacity: 0.72;
        text-transform: uppercase;
      }
      .nav-list {
        display: flex;
        min-height: 0;
        flex: 1 1 auto;
        flex-direction: column;
        overflow-y: auto;
      }
      .workspace-item {
        width: 100%;
        min-width: 0;
        display: grid;
        flex: 0 0 auto;
        grid-template-rows: 1fr;
        overflow: hidden;
        padding: 7px 10px 7px 9px;
        text-align: left;
        border: 0;
        border-left: 3px solid transparent;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        opacity: 1;
        transform: translateY(0);
        transition:
          grid-template-rows 160ms ease,
          opacity 160ms ease,
          transform 160ms ease,
          border-bottom-width 160ms ease,
          padding 160ms ease;
      }
      .workspace-item:hover {
        background: var(--active-bg);
      }
      .workspace-item.active {
        border-left-color: var(--accent);
        background: var(--accent-08);
      }
      .workspace-item.collapsed {
        grid-template-rows: 0fr;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-4px);
        padding-top: 0;
        padding-bottom: 0;
        border-bottom-width: 0;
      }
      .workspace-item-content {
        min-height: 0;
        overflow: hidden;
      }
      .workspace-row-primary {
        display: flex;
        min-width: 0;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .workspace-primary-left,
      .workspace-primary-right {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 6px;
      }
      .workspace-primary-right {
        flex: 0 0 auto;
      }
      .workspace-index {
        flex: 0 0 auto;
        min-width: 10px;
        color: var(--text-primary);
        font-size: 10px;
        font-weight: 500;
        opacity: 0.6;
      }
      .workspace-item.active .workspace-index {
        color: var(--accent);
        opacity: 0.9;
      }
      .workspace-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
      }
      .workspace-item.active .workspace-name {
        color: var(--text-primary);
      }
      .workspace-terminal-count {
        flex: 0 0 auto;
        color: var(--text-secondary);
        font-size: 9px;
        line-height: 1.3;
        padding: 1px 6px;
        border-radius: var(--radius-sm);
        background: var(--hover-bg);
        opacity: 0.7;
      }
      .workspace-count-badge {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        min-width: 14px;
        height: 14px;
        padding: 0 3px;
        border-radius: var(--radius-sm);
        background: var(--accent);
        color: var(--bg-base);
        font-size: 10px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }
      .notification-tab,
      .dock-tab {
        width: 100%;
        min-height: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 8px;
        border: 0;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        background: transparent;
        color: var(--text-primary);
        text-align: left;
      }
      .notification-tab:hover:not(:disabled),
      .dock-tab:hover:not(:disabled) {
        background: var(--hover-bg);
      }
      .notification-tab[aria-expanded="true"],
      .dock-tab[aria-expanded="true"] {
        background: var(--accent-08);
      }
      .notification-tab-label,
      .dock-tab-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: var(--fs-sm);
        font-weight: 650;
      }
      .notification-panel,
      .dock-panel {
        display: flex;
        flex-direction: column;
        max-height: min(46vh, 360px);
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.012);
      }
      .notification-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 7px 8px;
        border-bottom: 1px solid var(--border);
      }
      .notification-actions button {
        min-width: 0;
        padding-left: 6px;
        padding-right: 6px;
        font-size: var(--fs-sm);
      }
      .notification-list {
        min-height: 0;
        overflow-y: auto;
      }
      .notification-group-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 5px 8px 4px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-surface);
        color: var(--text-secondary);
        font-size: var(--fs-xs);
        font-weight: 600;
      }
      .notification-item {
        width: 100%;
        min-width: 0;
        display: grid;
        grid-template-columns: minmax(52px, 72px) minmax(0, 1fr) auto;
        gap: 7px;
        align-items: center;
        padding: 7px 8px;
        border: 0;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        background: transparent;
        color: var(--text-secondary);
        text-align: left;
      }
      .notification-item:hover:not(:disabled) {
        background: var(--hover-bg);
      }
      .notification-item.read {
        opacity: 0.6;
      }
      .notification-source,
      .notification-message,
      .notification-time {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: var(--fs-sm);
      }
      .notification-source {
        color: var(--text-secondary);
        opacity: 0.84;
      }
      .notification-message {
        color: var(--text-primary);
      }
      .notification-message.error {
        color: var(--red);
      }
      .notification-message.warning {
        color: var(--yellow);
      }
      .notification-message.success {
        color: var(--green);
      }
      .notification-time {
        color: var(--text-secondary);
        font-size: var(--fs-xs);
        opacity: 0.78;
      }
      .dock-group-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 5px 8px 4px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-surface);
        color: var(--text-secondary);
        font-size: var(--fs-xs);
        font-weight: 600;
        text-transform: uppercase;
      }
      .dock-terminal-row {
        padding-left: 8px;
        padding-right: 8px;
        border-radius: 0;
        border-bottom: 1px solid var(--border);
      }
      .dock-position-badge {
        flex: 0 0 auto;
        min-width: 38px;
        color: var(--accent);
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .workspace-pane-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-top: 4px;
      }
      .workspace-pane-row,
      .dock-terminal-row {
        width: 100%;
        min-width: 0;
        min-height: 18px;
        max-height: 18px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 1px 3px 1px 0;
        border: 0;
        border-radius: var(--radius-md);
        background: transparent;
        color: var(--text-secondary);
        font-size: var(--fs-sm);
        line-height: 1.25;
        text-align: left;
        cursor: pointer;
        overflow: hidden;
        opacity: 1;
        transform: translateY(0);
        transition:
          max-height 160ms ease,
          opacity 160ms ease,
          transform 160ms ease,
          margin 160ms ease;
      }
      .workspace-pane-row:hover:not(:disabled),
      .dock-terminal-row:hover:not(:disabled) {
        background: var(--hover-bg);
      }
      .workspace-pane-row:disabled,
      .dock-terminal-row:disabled {
        cursor: default;
        opacity: 0.72;
      }
      .workspace-pane-row.active,
      .dock-terminal-row.active {
        background: var(--accent-12);
        filter: brightness(1.3);
      }
      .workspace-pane-row.collapsed {
        max-height: 0;
        min-height: 0;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-3px);
        margin-top: 0;
        margin-bottom: 0;
      }
      .pane-minimap {
        flex: 0 0 auto;
        width: 18px;
        height: 12px;
        opacity: 0.5;
      }
      .workspace-pane-row.active .pane-minimap {
        opacity: 1;
      }
      .pane-row-main {
        display: flex;
        min-width: 0;
        flex: 1 1 auto;
        align-items: center;
        gap: 4px;
      }
      .pane-env {
        flex: 0 0 auto;
        color: var(--text-secondary);
        font-size: var(--fs-sm);
        font-weight: 600;
        opacity: 0.85;
      }
      .pane-activity {
        flex: 0 0 auto;
        min-width: 40px;
        margin-right: 4px;
        padding: 1px 4px;
        border-radius: var(--radius-sm);
        background: var(--active-bg);
        color: var(--text-secondary);
        font-size: 9px;
        text-align: center;
      }
      .pane-activity.running {
        color: var(--yellow);
        background: var(--accent-12);
      }
      .pane-activity.interactive {
        color: var(--accent);
        background: var(--accent-12);
      }
      .pane-branch {
        flex: 0 0 auto;
        color: var(--green);
      }
      .pane-path {
        min-width: 0;
        overflow: hidden;
        color: var(--text-secondary);
        opacity: 0.7;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pane-view-label {
        color: var(--text-secondary);
        font-weight: 600;
        opacity: 0.4;
      }
      .workspace-summary-line {
        min-height: 18px;
        margin-top: 2px;
        padding-left: 18px;
        color: var(--text-secondary);
        font-size: 12px;
        opacity: 0.5;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .nav-empty {
        margin: 0 8px 7px;
        padding: 7px 8px;
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: var(--radius-md);
      }
      .nav-section.locked {
        opacity: 0.45;
        pointer-events: none;
      }
      #terminal {
        width: 100%;
        height: 100%;
        min-height: 0;
        touch-action: none;
      }
      .xterm {
        height: 100%;
        padding: 4px;
        touch-action: none;
      }
      .xterm .xterm-viewport {
        background-color: transparent;
      }
      .grow {
        flex: 1 1 auto;
      }
      .terminal-meta {
        min-width: 160px;
        max-width: min(420px, 100%);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      footer .status-hint {
        min-width: 0;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      @media (max-width: 820px) {
        header {
          display: flex;
        }
        .remote-body {
          min-height: 0;
        }
        footer {
          align-items: stretch;
          display: grid;
          grid-template-columns: 1fr auto auto auto;
        }
        footer .status-hint {
          align-self: center;
        }
      }
      @media (max-width: 520px) {
        footer {
          grid-template-columns: 1fr 1fr 1fr;
        }
        footer .status-hint {
          grid-column: 1 / -1;
        }
        footer button {
          min-width: 0;
        }
      }
      @supports (height: 100dvh) {
        .app {
          height: 100dvh;
        }
      }
      .xterm-screen .xterm-decoration-top {
        pointer-events: none;
      }
      .xterm-helper-textarea {
        font-size: 16px;
      }
      .xterm-helpers textarea {
        opacity: 0;
      }
      .xterm-rows {
        letter-spacing: 0;
      }
      .xterm .xterm-scroll-area {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <button id="navToggle" class="menu-button" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="navigationPanel">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div id="status" class="status">Enter the remote token, then connect.</div>
        <button id="desktopModeHeader" class="desktop-mode-button" type="button" hidden>PC</button>
      </header>
      <main>
        <div class="remote-body">
          <button id="navScrim" class="nav-scrim" type="button" aria-label="Close navigation" hidden></button>
          <aside id="navigationPanel" class="navigation-panel" aria-label="Remote navigation">
            <div class="drawer-header">
              <div class="drawer-title">Remote</div>
              <div class="drawer-header-actions">
                <button id="desktopModeDrawer" class="desktop-mode-button" type="button" hidden>PC</button>
                <button id="navClose" class="drawer-close" type="button" aria-label="Close navigation">
                  <span></span>
                  <span></span>
                </button>
              </div>
            </div>
            <section class="connection-panel" aria-label="Remote connection">
              <div class="connection-title">Connection</div>
              <div class="connection-hint">Connect first to load workspaces and control the active terminal.</div>
              <label>Token <input id="token" type="password" autocomplete="current-password" /></label>
              <label>Name <input id="clientName" autocomplete="nickname" value="browser" /></label>
              <div class="connection-actions">
                <button id="connect" class="primary">Connect</button>
                <button id="release" class="danger" disabled>Release</button>
                <button id="refresh" disabled>Refresh</button>
              </div>
            </section>
            <section id="notificationSection" class="nav-section locked" aria-label="Notifications">
              <button id="notificationToggle" class="notification-tab" type="button" aria-expanded="false" aria-controls="notificationPanel" disabled>
                <span class="notification-tab-label">Notifications</span>
                <span id="notificationBadge" class="workspace-count-badge" hidden>0</span>
              </button>
              <div id="notificationPanel" class="notification-panel" hidden>
                <div class="notification-actions">
                  <button id="markAllNotificationsRead" type="button" disabled>Mark read</button>
                  <button id="clearNotifications" class="danger" type="button" disabled>Clear</button>
                </div>
                <div id="notificationList" class="notification-list"></div>
              </div>
            </section>
            <section id="workspaceSection" class="nav-section locked">
              <h2 class="nav-section-title">Workspaces</h2>
              <div id="workspaceList" class="nav-list"></div>
            </section>
            <section id="dockSection" class="nav-section locked">
              <button id="dockToggle" class="dock-tab" type="button" aria-expanded="false" aria-controls="dockPanel" disabled>
                <span class="dock-tab-label">Dock terminals</span>
                <span id="dockBadge" class="workspace-terminal-count" hidden>0</span>
              </button>
              <div id="dockPanel" class="dock-panel" hidden>
                <div id="dockList" class="nav-list"></div>
              </div>
            </section>
          </aside>
          <div class="terminal-shell">
            <div id="terminal" aria-label="Terminal output"></div>
          </div>
        </div>
      </main>
      <footer>
        <button id="copySelection" disabled>Copy</button>
        <button id="ctrlC" disabled>Ctrl+C</button>
        <button id="focusTerminal" disabled>Keyboard</button>
        <div id="terminalMeta" class="status-hint grow">No terminal selected.</div>
      </footer>
    </div>
    <script src="/remote/vendor/xterm.js"></script>
    <script src="/remote/vendor/addon-fit.js"></script>
    <script>
      (() => {
        const $ = (id) => document.getElementById(id);
        const tokenInput = $("token");
        const clientNameInput = $("clientName");
        const navToggleButton = $("navToggle");
        const navCloseButton = $("navClose");
        const desktopModeHeaderButton = $("desktopModeHeader");
        const desktopModeDrawerButton = $("desktopModeDrawer");
        const navScrim = $("navScrim");
        const connectButton = $("connect");
        const releaseButton = $("release");
        const refreshButton = $("refresh");
        const connectionPanel = document.querySelector(".connection-panel");
        const connectionHint = document.querySelector(".connection-hint");
        const statusEl = $("status");
        const terminalHost = $("terminal");
        const terminalShell = document.querySelector(".terminal-shell");
        const terminalMetaEl = $("terminalMeta");
        const workspaceSection = $("workspaceSection");
        const workspaceListEl = $("workspaceList");
        const dockSection = $("dockSection");
        const dockToggleButton = $("dockToggle");
        const dockBadge = $("dockBadge");
        const dockPanel = $("dockPanel");
        const dockListEl = $("dockList");
        const notificationSection = $("notificationSection");
        const notificationToggleButton = $("notificationToggle");
        const notificationBadge = $("notificationBadge");
        const notificationPanel = $("notificationPanel");
        const notificationListEl = $("notificationList");
        const markAllNotificationsReadButton = $("markAllNotificationsRead");
        const clearNotificationsButton = $("clearNotifications");
        const focusTerminalButton = $("focusTerminal");
        const copySelectionButton = $("copySelection");
        const ctrlCButton = $("ctrlC");
        const tokenKey = "laymux.remote.token";
        let leaseId = null;
        let heartbeatTimer = null;
        let socket = null;
        let activeTerminalId = null;
        let terminalInfoById = new Map();
        let navigationState = null;
        let terminal = null;
        let fitAddon = null;
        let resizeObserver = null;
        let resizeListenerAttached = false;
        let resizeTimer = null;
        let terminalRefreshFrame = null;
        let lastResizeKey = "";
        let pendingInput = "";
        let inputFlushTimer = null;
        let inputWriteChain = Promise.resolve();
        let notificationPanelOpen = false;
        let dockPanelOpen = false;

        const hashParams = new URLSearchParams(location.hash.replace(/^#/, ""));
        const searchParams = new URLSearchParams(location.search);
        const localAppMode = searchParams.get("localApp") === "1" || hashParams.get("localApp") === "1";
        const autoConnectMode = searchParams.get("autoConnect") === "1" || hashParams.get("autoConnect") === "1";
        const clientNameFromParams = searchParams.get("clientName") || hashParams.get("clientName");
        tokenInput.value =
          hashParams.get("token") ||
          searchParams.get("token") ||
          localStorage.getItem(tokenKey) ||
          "";
        if (clientNameFromParams) clientNameInput.value = clientNameFromParams;
        document.querySelector(".app").classList.toggle("local-app", localAppMode);
        desktopModeHeaderButton.hidden = !localAppMode;
        desktopModeDrawerButton.hidden = !localAppMode;

        const defaultAppearance = Object.freeze({
          fontFamily: "'Cascadia Mono', 'Cascadia Mono', 'Consolas', monospace",
          fontSize: 14,
          cursorStyle: "bar",
          cursorWidth: 1,
          scrollback: 10000,
          theme: Object.freeze({
            background: "#0C0C0C",
            foreground: "#F0F0F0",
            cursor: "#FFFFFF",
            selectionBackground: "#232042",
            black: "#0C0C0C",
            red: "#C50F1F",
            green: "#13A10E",
            yellow: "#C19C00",
            blue: "#0037DA",
            magenta: "#881798",
            cyan: "#3A96DD",
            white: "#F0F0F0",
            brightBlack: "#767676",
            brightRed: "#E74856",
            brightGreen: "#16C60C",
            brightYellow: "#F9F1A5",
            brightBlue: "#3B78FF",
            brightMagenta: "#B4009E",
            brightCyan: "#61D6D6",
            brightWhite: "#FFFFFF"
          })
        });

        function setStatus(message, error = false) {
          statusEl.textContent = message;
          statusEl.classList.toggle("error", error);
        }

        function token() {
          return tokenInput.value.trim();
        }

        function authHeaders() {
          return {
            "authorization": `Bearer ${token()}`,
            "content-type": "application/json",
          };
        }

        async function remoteFetch(path, options = {}) {
          const response = await fetch(path, {
            ...options,
            headers: { ...authHeaders(), ...(options.headers || {}) },
          });
          if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            throw new Error(body.error || `${response.status} ${response.statusText}`);
          }
          return response.json();
        }

        function setConnected(connected) {
          if (connectionPanel) connectionPanel.classList.toggle("connected", connected);
          if (connected) setConnectionHint("Connect first to load workspaces and control the active terminal.", false);
          workspaceSection.classList.toggle("locked", !connected);
          dockSection.classList.toggle("locked", !connected);
          dockToggleButton.disabled = !connected;
          notificationSection.classList.toggle("locked", !connected);
          notificationToggleButton.disabled = !connected;
          releaseButton.disabled = !connected;
          refreshButton.disabled = !connected;
          connectButton.disabled = connected;
          updateTerminalControls();
          updateNotificationActions();
        }

        function setConnectionHint(message, attention = false) {
          if (connectionHint) connectionHint.textContent = message;
          if (connectionPanel) connectionPanel.classList.toggle("attention", attention);
        }

        function normalizeAppearance(appearance = {}) {
          const fontSize = Number(appearance.fontSize);
          const cursorWidth = Number(appearance.cursorWidth);
          const cursorStyle = ["bar", "underline", "block"].includes(appearance.cursorStyle)
            ? appearance.cursorStyle
            : defaultAppearance.cursorStyle;
          return {
            fontFamily: appearance.fontFamily || defaultAppearance.fontFamily,
            fontSize: Number.isFinite(fontSize) && fontSize > 0 ? Math.floor(fontSize) : defaultAppearance.fontSize,
            cursorStyle,
            cursorWidth: Number.isFinite(cursorWidth) && cursorWidth > 0 ? Math.floor(cursorWidth) : undefined,
            scrollback: defaultAppearance.scrollback,
            theme: { ...defaultAppearance.theme, ...(appearance.theme || {}) },
          };
        }

        function terminalOptionsForAppearance(appearance = {}) {
          const normalized = normalizeAppearance(appearance);
          const options = {
            allowProposedApi: false,
            cols: 80,
            rows: 24,
            cursorBlink: true,
            cursorStyle: normalized.cursorStyle,
            fontFamily: normalized.fontFamily,
            fontSize: normalized.fontSize,
            letterSpacing: 0,
            macOptionClickForcesSelection: true,
            scrollback: normalized.scrollback,
            convertEol: false,
            theme: normalized.theme,
          };
          if (normalized.cursorWidth !== undefined) {
            options.cursorWidth = normalized.cursorWidth;
          }
          return options;
        }

        function applyTerminalAppearance(appearance = {}) {
          if (!terminal) return;
          const options = terminalOptionsForAppearance(appearance);
          delete options.cols;
          delete options.rows;
          terminal.options = options;
          if (options.cursorWidth === undefined) {
            try {
              delete terminal.options.cursorWidth;
            } catch (_) {
              terminal.options.cursorWidth = undefined;
            }
          }
          if (typeof terminal.refresh === "function" && terminal.rows > 0) {
            terminal.refresh(0, terminal.rows - 1);
          }
        }

        function hasTerminalSelection() {
          return Boolean(terminal && typeof terminal.hasSelection === "function" && terminal.hasSelection());
        }

        function updateTerminalControls() {
          const canControl = Boolean(leaseId && activeTerminalId);
          ctrlCButton.disabled = !canControl;
          focusTerminalButton.disabled = !canControl;
          copySelectionButton.disabled = !canControl || !hasTerminalSelection();
        }

        function fallbackCopyText(text) {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          textarea.style.top = "0";
          document.body.append(textarea);
          textarea.focus();
          textarea.select();
          try {
            return Boolean(document.execCommand && document.execCommand("copy"));
          } finally {
            textarea.remove();
          }
        }

        async function writeClipboardText(text) {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return;
          }
          if (!fallbackCopyText(text)) {
            throw new Error("Clipboard API unavailable");
          }
        }

        async function copySelectionToClipboard() {
          if (!terminal || !terminal.hasSelection()) {
            updateTerminalControls();
            return;
          }
          const text = terminal.getSelection();
          if (!text) {
            updateTerminalControls();
            return;
          }
          try {
            await writeClipboardText(text);
            setStatus("Selection copied.");
          } catch (err) {
            setStatus(`Copy failed: ${err.message || err}`, true);
          } finally {
            updateTerminalControls();
          }
        }

        function isTouchSelectionPointer(event) {
          return event.pointerType === "touch" || event.pointerType === "pen";
        }

        function shouldForceTouchSelection(term) {
          const mouseTrackingMode = term && term.modes && term.modes.mouseTrackingMode;
          return Boolean(mouseTrackingMode && mouseTrackingMode !== "none");
        }

        function touchSelectionMouseEvent(type, pointerEvent, forceSelection) {
          return new MouseEvent(type, {
            bubbles: true,
            cancelable: true,
            view: window,
            detail: type === "mousedown" ? 1 : 0,
            screenX: pointerEvent.screenX,
            screenY: pointerEvent.screenY,
            clientX: pointerEvent.clientX,
            clientY: pointerEvent.clientY,
            button: 0,
            buttons: type === "mouseup" ? 0 : 1,
            shiftKey: forceSelection,
            altKey: forceSelection,
          });
        }

        function dispatchTouchSelectionMouse(target, type, pointerEvent, forceSelection) {
          target.dispatchEvent(touchSelectionMouseEvent(type, pointerEvent, forceSelection));
        }

        function installTouchSelectionBridge(term) {
          const element = term && term.element;
          if (!element || element.dataset.touchSelectionBridge === "true") return;
          element.dataset.touchSelectionBridge = "true";

          let activePointerId = null;
          let forceSelection = false;
          const pointerOptions = { passive: false };

          element.addEventListener("pointerdown", (event) => {
            if (!isTouchSelectionPointer(event) || activePointerId !== null || event.isPrimary === false) return;
            activePointerId = event.pointerId;
            forceSelection = shouldForceTouchSelection(term);
            event.preventDefault();
            event.stopPropagation();
            element.setPointerCapture?.(event.pointerId);
            dispatchTouchSelectionMouse(element, "mousedown", event, forceSelection);
          }, pointerOptions);

          element.addEventListener("pointermove", (event) => {
            if (event.pointerId !== activePointerId) return;
            event.preventDefault();
            event.stopPropagation();
            dispatchTouchSelectionMouse(document, "mousemove", event, forceSelection);
          }, pointerOptions);

          const finishTouchSelection = (event) => {
            if (event.pointerId !== activePointerId) return;
            event.preventDefault();
            event.stopPropagation();
            dispatchTouchSelectionMouse(document, "mouseup", event, forceSelection);
            if (element.hasPointerCapture?.(event.pointerId)) {
              element.releasePointerCapture?.(event.pointerId);
            }
            activePointerId = null;
            forceSelection = false;
            updateTerminalControls();
          };

          element.addEventListener("pointerup", finishTouchSelection, pointerOptions);
          element.addEventListener("pointercancel", finishTouchSelection, pointerOptions);
        }

        function ensureTerminal(appearance = {}) {
          if (terminal) return terminal;
          const TerminalCtor = window.Terminal;
          const FitAddonCtor = window.FitAddon && window.FitAddon.FitAddon;
          if (!TerminalCtor || !FitAddonCtor) {
            throw new Error("xterm assets failed to load");
          }
          terminal = new TerminalCtor(terminalOptionsForAppearance(appearance));
          fitAddon = new FitAddonCtor();
          terminal.loadAddon(fitAddon);
          terminal.open(terminalHost);
          installTouchSelectionBridge(terminal);
          terminal.onData((data) => enqueueInput(data));
          terminal.onResize(({ cols, rows }) => queueResize(cols, rows));
          terminal.onSelectionChange(() => updateTerminalControls());
          if ("ResizeObserver" in window) {
            resizeObserver = new ResizeObserver(() => fitTerminal());
            resizeObserver.observe(terminalHost);
            if (terminalShell) resizeObserver.observe(terminalShell);
          } else if (!resizeListenerAttached) {
            window.addEventListener("resize", () => fitTerminal());
            resizeListenerAttached = true;
          }
          scheduleTerminalFit(Boolean(activeTerminalId));
          return terminal;
        }

        function stopSocket() {
          if (socket) {
            const closingSocket = socket;
            socket = null;
            closingSocket.onclose = null;
            closingSocket.onerror = null;
            closingSocket.close();
          }
        }

        function stopHeartbeat() {
          if (heartbeatTimer) {
            clearInterval(heartbeatTimer);
            heartbeatTimer = null;
          }
        }

        function stopInputFlush() {
          if (inputFlushTimer) {
            clearTimeout(inputFlushTimer);
            inputFlushTimer = null;
          }
          pendingInput = "";
        }

        function stopResizeFlush() {
          if (resizeTimer) {
            clearTimeout(resizeTimer);
            resizeTimer = null;
          }
        }

        async function heartbeat() {
          if (!leaseId) return;
          await remoteFetch("/remote/v1/session/heartbeat", {
            method: "POST",
            body: JSON.stringify({ leaseId }),
          });
        }

        function startHeartbeat(timeoutSeconds) {
          stopHeartbeat();
          const intervalMs = Math.max(1000, Math.floor(timeoutSeconds * 333));
          heartbeatTimer = setInterval(() => {
            heartbeat().catch((err) => {
              loseRemoteControl(`Control returned to the host. ${err.message}`);
            });
          }, intervalMs);
        }

        function terminalLabel(terminalInfo) {
          return [terminalInfo.title || terminalInfo.id, terminalInfo.profile || "", terminalInfo.cwd || ""]
            .filter(Boolean)
            .join(" - ");
        }

        function shortPath(path) {
          if (!path) return "";
          const parts = String(path).split(/[\\/]+/).filter(Boolean);
          return parts[parts.length - 1] || path;
        }

        function activityLabel(activity, commandRunning) {
          if (activity && activity.type === "interactiveApp") return activity.name || "Interactive";
          if (activity && activity.type === "running") return "Running";
          if (commandRunning) return "Running";
          return "";
        }

        function metaText(parts) {
          return parts.filter(Boolean).join(" - ");
        }

        function countBadgeText(count) {
          const value = Number(count) || 0;
          return value > 999 ? "999+" : String(value);
        }

        function countBadgeFontSize(text) {
          const sizes = ["10px", "10px", "9.5px", "8.5px", "7.5px"];
          return sizes[Math.min(text.length, sizes.length - 1)];
        }

        function fillCountBadge(element, count) {
          const text = countBadgeText(count);
          element.textContent = text;
          element.style.fontSize = countBadgeFontSize(text);
        }

        function notificationCount() {
          return ((navigationState && navigationState.notifications) || []).length;
        }

        function unreadNotificationCount() {
          return Number((navigationState && navigationState.unreadNotificationCount) || 0);
        }

        function updateNotificationActions() {
          const hasNotifications = notificationCount() > 0;
          const hasUnread = unreadNotificationCount() > 0;
          markAllNotificationsReadButton.disabled = !leaseId || !hasUnread;
          clearNotificationsButton.disabled = !leaseId || !hasNotifications;
        }

        function setNotificationPanelOpen(open) {
          notificationPanelOpen = Boolean(open);
          notificationPanel.hidden = !notificationPanelOpen;
          notificationToggleButton.setAttribute("aria-expanded", String(notificationPanelOpen));
        }

        function setDockPanelOpen(open) {
          dockPanelOpen = Boolean(open);
          dockPanel.hidden = !dockPanelOpen;
          dockToggleButton.setAttribute("aria-expanded", String(dockPanelOpen));
        }

        function formatNotificationTime(createdAt) {
          const timestamp = Number(createdAt);
          if (!Number.isFinite(timestamp) || timestamp <= 0) return "";
          const diff = Date.now() - timestamp;
          if (diff < 60000) return "now";
          if (diff < 3600000) return `${Math.floor(diff / 60000)}m`;
          if (diff < 86400000) return `${Math.floor(diff / 3600000)}h`;
          return `${Math.floor(diff / 86400000)}d`;
        }

        function notificationSource(notification) {
          return notification.terminalLabel || notification.title || notification.workspaceName || notification.workspaceId || "Notification";
        }

        function notificationLevelClass(level) {
          return ["error", "warning", "success", "info"].includes(level) ? level : "info";
        }

        function renderNotificationPanel(notifications, unreadCount) {
          const badgeCount = Number(unreadCount) || 0;
          notificationBadge.hidden = badgeCount <= 0;
          if (badgeCount > 0) fillCountBadge(notificationBadge, badgeCount);
          notificationListEl.innerHTML = "";
          if (!notifications.length) {
            emptyNav(notificationListEl, "No notifications.");
            updateNotificationActions();
            return;
          }

          const workspaceKeys = [];
          for (const notification of notifications) {
            const workspaceKey = notification.workspaceId || "__global__";
            if (!workspaceKeys.includes(workspaceKey)) {
              workspaceKeys.push(workspaceKey);
            }
          }
          for (const workspaceKey of workspaceKeys) {
            const groupNotifications = notifications.filter((notification) => (notification.workspaceId || "__global__") === workspaceKey);
            const first = groupNotifications[0] || {};
            const title = document.createElement("div");
            title.className = "notification-group-title";
            title.textContent = first.workspaceName || first.workspaceId || "Notifications";
            notificationListEl.append(title);
            groupNotifications.forEach((notification) => {
              notificationListEl.append(renderNotificationItem(notification));
            });
          }
          updateNotificationActions();
        }

        function renderNotificationItem(notification) {
          const item = document.createElement("button");
          item.type = "button";
          item.className = `notification-item${notification.isRead ? " read" : ""}`;
          item.disabled = !leaseId;
          item.dataset.notificationId = notification.id || "";
          item.addEventListener("click", () => {
            openNotification(notification).catch((err) => setStatus(err.message || String(err), true));
          });

          const source = document.createElement("span");
          source.className = "notification-source";
          source.textContent = notificationSource(notification);
          item.append(source);

          const message = document.createElement("span");
          message.className = `notification-message ${notificationLevelClass(notification.level)}`;
          message.textContent = notification.message || "";
          item.append(message);

          const time = document.createElement("span");
          time.className = "notification-time";
          time.textContent = formatNotificationTime(notification.createdAt);
          item.append(time);

          return item;
        }

        function workspaceDisplaySettings() {
          const display = navigationState && navigationState.workspaceSelector && navigationState.workspaceSelector.display;
          return {
            minimap: display && typeof display.minimap === "boolean" ? display.minimap : true,
            environment: display && typeof display.environment === "boolean" ? display.environment : true,
            activity: display && typeof display.activity === "boolean" ? display.activity : true,
            path: display && typeof display.path === "boolean" ? display.path : true,
            result: display && typeof display.result === "boolean" ? display.result : true,
          };
        }

        function pathEllipsisMode() {
          const selector = navigationState && navigationState.workspaceSelector;
          return selector && selector.pathEllipsis === "end" ? "end" : "start";
        }

        function emptyNav(container, text) {
          container.innerHTML = "";
          const item = document.createElement("div");
          item.className = "nav-empty";
          item.textContent = text;
          container.append(item);
        }

        function setNavigationOpen(open) {
          document.querySelector(".app").classList.toggle("nav-open", open);
          navToggleButton.setAttribute("aria-expanded", String(open));
          navToggleButton.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");
          navScrim.hidden = !open;
          scheduleTerminalFit(Boolean(activeTerminalId));
        }

        function renderNavigation(data) {
          renderNotificationPanel(data.notifications || [], data.unreadNotificationCount || 0);
          renderWorkspaceList(data.workspaces || []);
          renderDockList(data.docks || []);
        }

        function renderDockList(docks) {
          dockListEl.innerHTML = "";
          const visibleDocks = docks.filter((dock) => dock.visible !== false);
          const terminalRows = visibleDocks.flatMap((dock) =>
            (dock.panes || [])
              .map((pane) => ({ dock, pane }))
              .filter(({ pane }) => pane.viewType === "TerminalView" && pane.terminalId)
          );
          dockBadge.hidden = terminalRows.length <= 0;
          if (terminalRows.length > 0) {
            dockBadge.textContent = String(terminalRows.length);
          }
          if (!terminalRows.length) {
            emptyNav(dockListEl, "No dock terminals.");
            return;
          }

          for (const dock of visibleDocks) {
            const panes = dock.panes || [];
            const terminalPanes = panes
              .map((pane) => ({ pane }))
              .filter(({ pane }) => pane.viewType === "TerminalView" && pane.terminalId);
            if (!terminalPanes.length) continue;

            const title = document.createElement("div");
            title.className = "dock-group-title";
            title.textContent = dock.position || "dock";
            dockListEl.append(title);

            terminalPanes.forEach(({ pane }) => {
              dockListEl.append(renderDockTerminalRow(dock, pane));
            });
          }
        }

        function renderDockTerminalRow(dock, pane) {
          const isTerminal = Boolean(pane.terminalId && pane.terminalLive);
          const isActive = Boolean(isTerminal && (pane.terminalId === activeTerminalId || pane.isFocused));
          const canSelectTerminal = Boolean(leaseId && isTerminal);
          const row = document.createElement(canSelectTerminal ? "button" : "div");
          if (canSelectTerminal) row.type = "button";
          row.className = `dock-terminal-row${isActive ? " active" : ""}`;
          if (canSelectTerminal) {
            row.addEventListener("click", () => {
              selectTerminal(pane.terminalId, {
                focusHost: true,
                focusDockHost: true,
                refreshNavigation: true,
              }).catch((err) => setStatus(err.message, true));
            });
          }

          const position = document.createElement("span");
          position.className = "dock-position-badge";
          position.textContent = shortLabel(dock.position || "dock");
          row.append(position);

          const main = document.createElement("div");
          main.className = "pane-row-main";
          row.append(main);

          const env = document.createElement("span");
          env.className = "pane-env";
          env.textContent = shortLabel(pane.profile || pane.title || "TerminalView");
          main.append(env);

          const activity = activityLabel(pane.activity, pane.commandRunning);
          if (activity) {
            const activityEl = document.createElement("span");
            const activityType = pane.activity && pane.activity.type === "interactiveApp"
              ? "interactive"
              : "running";
            activityEl.className = `pane-activity ${activityType}`;
            activityEl.textContent = activity;
            main.append(activityEl);
          }

          if (pane.branch) {
            const branch = document.createElement("span");
            branch.className = "pane-branch";
            branch.textContent = pane.branch;
            main.append(branch);
          }

          const path = document.createElement("span");
          path.className = "pane-path";
          path.textContent = pane.cwd || pane.title || pane.terminalId;
          if (pathEllipsisMode() === "start") {
            path.style.direction = "rtl";
            path.style.textAlign = "left";
          }
          main.append(path);

          if ((pane.unreadCount || 0) > 0) {
            const unread = document.createElement("span");
            unread.className = "workspace-count-badge";
            fillCountBadge(unread, pane.unreadCount);
            main.append(unread);
          }

          return row;
        }

        function renderWorkspaceList(workspaces) {
          workspaceListEl.innerHTML = "";
          if (!workspaces.length) {
            emptyNav(workspaceListEl, "No workspaces.");
            return;
          }
          const activePanes = (navigationState && navigationState.activeWorkspace && navigationState.activeWorkspace.panes) || [];
          for (let index = 0; index < workspaces.length; index += 1) {
            const workspace = workspaces[index];
            const panes = workspace.isActive ? (workspace.panes || activePanes) : [];
            workspaceListEl.append(renderWorkspaceItem(workspace, index, panes));
          }
        }

        function renderWorkspaceItem(workspace, index, panes) {
          const item = document.createElement("div");
          item.className = `workspace-item${workspace.isActive ? " active" : ""}${workspace.collapsed ? " collapsed" : ""}`;
          if (workspace.collapsed) item.setAttribute("aria-hidden", "true");
          item.addEventListener("click", () => {
            if (!leaseId || workspace.collapsed) return;
            switchWorkspace(workspace.id).catch((err) => setStatus(err.message, true));
          });

          const content = document.createElement("div");
          content.className = "workspace-item-content";
          item.append(content);

          const row = document.createElement("div");
          row.className = "workspace-row-primary";
          content.append(row);

          const left = document.createElement("span");
          left.className = "workspace-primary-left";
          row.append(left);

          const indexEl = document.createElement("span");
          indexEl.className = "workspace-index";
          indexEl.textContent = index < 9 ? String(index + 1) : "";
          left.append(indexEl);

          const nameEl = document.createElement("span");
          nameEl.className = "workspace-name";
          nameEl.textContent = workspace.name || workspace.id || "Workspace";
          left.append(nameEl);

          if ((workspace.terminalPaneCount || 0) > 0) {
            const count = document.createElement("span");
            count.className = "workspace-terminal-count";
            count.textContent = String(workspace.terminalPaneCount);
            left.append(count);
          }

          const right = document.createElement("span");
          right.className = "workspace-primary-right";
          row.append(right);
          if ((workspace.unreadCount || 0) > 0) {
            const badge = document.createElement("span");
            badge.className = "workspace-count-badge";
            fillCountBadge(badge, workspace.unreadCount);
            right.append(badge);
          }

          if (panes.length > 0) {
            const paneList = document.createElement("div");
            paneList.className = "workspace-pane-list";
            content.append(paneList);
            panes.forEach((pane, paneIndex) => {
              paneList.append(renderPaneRow(pane, panes, paneIndex, workspace.isActive));
            });
          } else {
            const summary = document.createElement("div");
            summary.className = "workspace-summary-line";
            summary.textContent = metaText([
              `${workspace.paneCount || 0} panes`,
              `${workspace.liveTerminalCount || 0} live`,
              (workspace.unreadCount || 0) > 0 ? `${workspace.unreadCount} unread` : "",
            ]);
            content.append(summary);
          }

          return item;
        }

        function renderPaneRow(pane, panes, paneIndex, workspaceActive) {
          const isTerminal = Boolean(pane.terminalId && pane.terminalLive);
          const isActive = Boolean(isTerminal && pane.terminalId === activeTerminalId);
          const canSelectTerminal = Boolean(workspaceActive && leaseId && isTerminal && !pane.collapsed);
          const row = document.createElement(canSelectTerminal ? "button" : "div");
          if (canSelectTerminal) row.type = "button";
          row.className = `workspace-pane-row${isActive ? " active" : ""}${pane.collapsed ? " collapsed" : ""}`;
          if (pane.collapsed) row.setAttribute("aria-hidden", "true");
          if (canSelectTerminal) {
            row.addEventListener("click", (event) => {
              event.stopPropagation();
              selectTerminal(pane.terminalId, { focusHost: true, refreshNavigation: true }).catch((err) => setStatus(err.message, true));
            });
          }

          const display = workspaceDisplaySettings();
          if (display.minimap) {
            const minimap = paneMinimapElement(panes, paneIndex);
            row.append(minimap);
          } else {
            row.style.paddingLeft = "18px";
          }

          const main = document.createElement("div");
          main.className = "pane-row-main";
          row.append(main);

          if (isTerminal) {
            if (display.environment) {
              const env = document.createElement("span");
              env.className = "pane-env";
              env.textContent = shortLabel(pane.profile || pane.title || "TerminalView");
              main.append(env);
            }

            const activity = activityLabel(pane.activity, pane.commandRunning);
            if (display.activity && activity) {
              const activityEl = document.createElement("span");
              const activityType = pane.activity && pane.activity.type === "interactiveApp"
                ? "interactive"
                : "running";
              activityEl.className = `pane-activity ${activityType}`;
              activityEl.textContent = activity;
              main.append(activityEl);
            }

            if (display.path && pane.branch) {
              const branch = document.createElement("span");
              branch.className = "pane-branch";
              branch.textContent = pane.branch;
              main.append(branch);
            }

            if (display.path) {
              const path = document.createElement("span");
              path.className = "pane-path";
              path.textContent = pane.cwd || pane.title || pane.terminalId;
              if (pathEllipsisMode() === "start") {
                path.style.direction = "rtl";
                path.style.textAlign = "left";
              }
              main.append(path);
            }

            if (display.result && (pane.unreadCount || 0) > 0) {
              const unread = document.createElement("span");
              unread.className = "workspace-count-badge";
              fillCountBadge(unread, pane.unreadCount);
              main.append(unread);
            }
          } else {
            const label = document.createElement("span");
            label.className = "pane-view-label";
            label.textContent = shortLabel(pane.viewType);
            main.append(label);
          }

          return row;
        }

        function paneMinimapElement(panes, highlightIndex) {
          const width = 18;
          const height = 12;
          const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          svg.setAttribute("class", "pane-minimap");
          svg.setAttribute("width", String(width));
          svg.setAttribute("height", String(height));
          svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
          panes.forEach((pane, index) => {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            const highlighted = index === highlightIndex;
            rect.setAttribute("x", String((Number(pane.x) || 0) * width));
            rect.setAttribute("y", String((Number(pane.y) || 0) * height));
            rect.setAttribute("width", String((Number(pane.w) || 1) * width));
            rect.setAttribute("height", String((Number(pane.h) || 1) * height));
            rect.setAttribute("fill", highlighted ? "var(--accent)" : "var(--bg-surface)");
            rect.setAttribute("fill-opacity", highlighted ? "0.6" : "0.3");
            rect.setAttribute("stroke", "var(--border)");
            rect.setAttribute("stroke-width", "0.5");
            svg.append(rect);
          });
          const border = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          border.setAttribute("x", "0");
          border.setAttribute("y", "0");
          border.setAttribute("width", String(width));
          border.setAttribute("height", String(height));
          border.setAttribute("fill", "none");
          border.setAttribute("stroke", "var(--text-secondary)");
          border.setAttribute("stroke-width", "1");
          border.setAttribute("rx", "1");
          svg.append(border);
          return svg;
        }

        function isDockTerminalId(terminalId) {
          if (!terminalId || !navigationState) return false;
          return (navigationState.docks || []).some((dock) =>
            (dock.panes || []).some((pane) => pane.terminalId === terminalId)
          );
        }

        function shortLabel(label) {
          if (!label) return "";
          const known = {
            TerminalView: "TERM",
            MemoView: "MEM",
            FileExplorerView: "FS",
            SettingsView: "SET",
            IssueReporterView: "ISS",
            EmptyView: "---",
          };
          return known[label] || String(label).slice(0, 3).toUpperCase();
        }

        function preferredTerminal(data, terminals, preferredTerminalId) {
          if (preferredTerminalId) {
            const existing = terminals.find((terminalInfo) => terminalInfo.id === preferredTerminalId);
            if (existing) return existing;
          }
          const activePanes = (data.activeWorkspace && data.activeWorkspace.panes) || [];
          const focusedNumber = data.activeWorkspace && data.activeWorkspace.focusedPaneNumber;
          const focusedPane = activePanes.find((pane) => pane.paneNumber === focusedNumber && pane.terminalId && pane.terminalLive);
          const activePane = focusedPane || activePanes.find((pane) => pane.terminalId && pane.terminalLive);
          if (activePane) return terminals.find((terminalInfo) => terminalInfo.id === activePane.terminalId) || null;
          for (const dock of data.docks || []) {
            const dockPane = (dock.panes || []).find((pane) => pane.terminalId && pane.terminalLive);
            if (dockPane) return terminals.find((terminalInfo) => terminalInfo.id === dockPane.terminalId) || null;
          }
          return terminals[0] || null;
        }

        async function loadNavigation(preferredTerminalId = activeTerminalId, options = {}) {
          const data = await remoteFetch("/remote/v1/navigation");
          navigationState = data;
          const terminals = data.terminals || [];
          terminalInfoById = new Map(terminals.map((terminalInfo) => [terminalInfo.id, terminalInfo]));
          const nextTerminal = preferredTerminal(data, terminals, preferredTerminalId);
          activeTerminalId = nextTerminal ? nextTerminal.id : null;
          renderNavigation(data);
          setConnected(Boolean(leaseId));
          if (activeTerminalId) {
            terminalMetaEl.textContent = terminalLabel(nextTerminal);
            if (options.openOutput !== false) openOutput(activeTerminalId);
          } else {
            terminalMetaEl.textContent = "No open terminal sessions.";
            setStatus("No open terminal sessions.", true);
            stopSocket();
          }
        }

        async function activateWorkspace(workspaceId) {
          if (!leaseId || !workspaceId) return;
          await remoteFetch("/remote/v1/workspaces/active", {
            method: "POST",
            body: JSON.stringify({ leaseId, id: workspaceId }),
          });
        }

        async function switchWorkspace(workspaceId) {
          if (!leaseId || !workspaceId) return;
          setStatus("Switching workspace...");
          await activateWorkspace(workspaceId);
          await loadNavigation(null);
          setNavigationOpen(false);
        }

        async function markNotificationRead(notification) {
          if (!leaseId || !notification || !notification.id) return;
          await remoteFetch(`/remote/v1/notifications/${encodeURIComponent(notification.id)}/read`, {
            method: "POST",
            body: JSON.stringify({ leaseId }),
          });
        }

        async function markAllNotificationsRead() {
          if (!leaseId) return;
          setStatus("Marking notifications read...");
          await remoteFetch("/remote/v1/notifications/mark-all-read", {
            method: "POST",
            body: JSON.stringify({ leaseId }),
          });
          await loadNavigation(activeTerminalId, { openOutput: false });
          setStatus("Notifications marked read.");
        }

        async function clearNotifications() {
          if (!leaseId) return;
          setStatus("Clearing notifications...");
          await remoteFetch("/remote/v1/notifications", {
            method: "DELETE",
            body: JSON.stringify({ leaseId }),
          });
          await loadNavigation(activeTerminalId, { openOutput: false });
          setStatus("Notifications cleared.");
        }

        async function openNotification(notification) {
          if (!leaseId || !notification) return;
          setStatus("Opening notification...");
          if (notification.terminalId) {
            try {
              await focusTerminalOnHost(notification.terminalId);
            } catch (err) {
              await markNotificationRead(notification).catch(() => {});
              await loadNavigation(activeTerminalId, { openOutput: false }).catch(() => {});
              throw err;
            }
            await loadNavigation(notification.terminalId);
            setNavigationOpen(false);
            return;
          }

          if (notification.workspaceId) {
            await activateWorkspace(notification.workspaceId);
          } else {
            await markNotificationRead(notification);
          }
          await loadNavigation(null);
          setNavigationOpen(false);
        }

        async function focusTerminalOnHost(terminalId) {
          if (!leaseId || !terminalId) return;
          await remoteFetch(`/remote/v1/terminals/${encodeURIComponent(terminalId)}/focus`, {
            method: "POST",
            body: JSON.stringify({ leaseId }),
          });
        }

        async function selectTerminal(terminalId, options = {}) {
          if (!terminalId) return;
          activeTerminalId = terminalId;
          const terminalInfo = terminalInfoById.get(terminalId);
          terminalMetaEl.textContent = terminalInfo ? terminalLabel(terminalInfo) : terminalId;
          setConnected(Boolean(leaseId));
          const canFocusHost =
            options.focusHost !== false && (options.focusDockHost === true || !isDockTerminalId(terminalId));
          if (canFocusHost) {
            await focusTerminalOnHost(terminalId).catch((err) => setStatus(`Focus failed: ${err.message}`, true));
          }
          if (options.refreshNavigation) {
            await loadNavigation(terminalId, { openOutput: false }).catch((err) => setStatus(`Refresh failed: ${err.message}`, true));
          } else if (navigationState) {
            renderNavigation(navigationState);
          }
          openOutput(terminalId);
          setNavigationOpen(false);
        }

        function wsBaseUrl() {
          const protocol = location.protocol === "https:" ? "wss:" : "ws:";
          return `${protocol}//${location.host}`;
        }

        function openOutput(terminalId) {
          const terminalInfo = terminalInfoById.get(terminalId);
          const term = ensureTerminal(terminalInfo && terminalInfo.appearance);
          stopSocket();
          stopInputFlush();
          stopResizeFlush();
          applyTerminalAppearance(terminalInfo && terminalInfo.appearance);
          term.reset();
          updateTerminalControls();
          lastResizeKey = "";
          const url = `${wsBaseUrl()}/remote/v1/terminals/${encodeURIComponent(terminalId)}/output?leaseId=${encodeURIComponent(leaseId)}&token=${encodeURIComponent(token())}`;
          const outputSocket = new WebSocket(url);
          socket = outputSocket;
          outputSocket.binaryType = "arraybuffer";
          outputSocket.onopen = () => {
            if (socket === outputSocket) {
              setStatus(`Connected to ${terminalId}`);
              scheduleTerminalFit(true);
              term.focus();
            }
          };
          outputSocket.onmessage = (event) => {
            if (socket !== outputSocket) return;
            let payload;
            if (event.data instanceof ArrayBuffer) {
              payload = new Uint8Array(event.data);
            } else {
              payload = String(event.data);
            }
            term.write(payload, scheduleTerminalRefresh);
          };
          outputSocket.onclose = () => {
            if (socket === outputSocket) {
              socket = null;
              if (leaseId) loseRemoteControl("Control returned to the host. Connect again to resume.");
            }
          };
          outputSocket.onerror = () => {
            if (socket === outputSocket) setStatus("Output stream error.", true);
          };
        }

        async function connect() {
          if (!token()) {
            setStatus("Remote token is required.", true);
            return;
          }
          localStorage.setItem(tokenKey, token());
          setStatus("Claiming remote control...");
          try {
            const status = await remoteFetch("/remote/v1/session/claim", {
              method: "POST",
              body: JSON.stringify({ clientName: clientNameInput.value.trim() || "browser" }),
            });
            leaseId = status.leaseId;
            ensureTerminal();
            setConnected(true);
            startHeartbeat(status.heartbeatTimeoutSeconds || 15);
            await loadNavigation();
            setNavigationOpen(false);
          } catch (err) {
            const failedLease = leaseId;
            disconnect(false);
            if (failedLease) await releaseLease(failedLease).catch(() => {});
            setStatus(err.message, true);
          }
        }

        async function writeToTerminal(terminalId, activeLeaseId, data) {
          await remoteFetch(`/remote/v1/terminals/${encodeURIComponent(terminalId)}/write`, {
            method: "POST",
            body: JSON.stringify({ leaseId: activeLeaseId, data }),
          });
        }

        function enqueueInput(data) {
          if (!leaseId || !activeTerminalId) return;
          const inputTerminalId = activeTerminalId;
          const inputLeaseId = leaseId;
          pendingInput += data;
          if (!inputFlushTimer) {
            inputFlushTimer = setTimeout(() => {
              inputFlushTimer = null;
              const dataToSend = pendingInput;
              pendingInput = "";
              if (!dataToSend || inputTerminalId !== activeTerminalId || inputLeaseId !== leaseId) {
                return;
              }
              inputWriteChain = inputWriteChain
                .catch(() => {})
                .then(() => {
                  if (inputTerminalId !== activeTerminalId || inputLeaseId !== leaseId) {
                    return;
                  }
                  return writeToTerminal(inputTerminalId, inputLeaseId, dataToSend);
                })
                .catch((err) => setStatus(err.message, true));
            }, 12);
          }
        }

        function fitTerminal(sendResize = true) {
          if (!terminal || !fitAddon) return;
          const rect = terminalHost.getBoundingClientRect();
          if (rect.width < 20 || rect.height < 20) return;
          try {
            fitAddon.fit();
          } catch (err) {
            setStatus(`Fit failed: ${err.message}`, true);
            return;
          }
          if (sendResize && terminal.cols > 0 && terminal.rows > 0) {
            queueResize(terminal.cols, terminal.rows);
          }
          scheduleTerminalRefresh();
        }

        function scheduleTerminalFit(sendResize = true) {
          if (!terminal || !fitAddon) return;
          requestAnimationFrame(() => {
            fitTerminal(sendResize);
            setTimeout(() => fitTerminal(sendResize), 160);
          });
        }

        function scheduleTerminalRefresh() {
          if (!terminal || terminal.rows <= 0 || terminalRefreshFrame !== null) return;
          terminalRefreshFrame = requestAnimationFrame(() => {
            terminalRefreshFrame = null;
            if (terminal && terminal.rows > 0) {
              terminal.refresh(0, terminal.rows - 1);
            }
          });
        }

        function queueResize(cols, rows) {
          if (!leaseId || !activeTerminalId || !Number.isFinite(cols) || !Number.isFinite(rows) || cols < 1 || rows < 1) return;
          const resizeTerminalId = activeTerminalId;
          const resizeLeaseId = leaseId;
          const resizeKey = `${resizeTerminalId}:${cols}x${rows}`;
          if (resizeKey === lastResizeKey) return;
          if (resizeTimer) clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            resizeTimer = null;
            if (resizeTerminalId !== activeTerminalId || resizeLeaseId !== leaseId) {
              return;
            }
            lastResizeKey = resizeKey;
            resizeTerminal(resizeTerminalId, resizeLeaseId, cols, rows).catch((err) => setStatus(`Resize failed: ${err.message}`, true));
          }, 120);
        }

        async function resizeTerminal(terminalId, activeLeaseId, cols, rows) {
          await remoteFetch(`/remote/v1/terminals/${encodeURIComponent(terminalId)}/resize`, {
            method: "POST",
            body: JSON.stringify({ leaseId: activeLeaseId, cols, rows }),
          });
        }

        async function release() {
          if (!leaseId) return;
          const currentLease = leaseId;
          await releaseLease(currentLease);
          disconnect(false);
          setConnectionHint("Connect first to load workspaces and control the active terminal.", false);
          setStatus("Released remote control.");
        }

        async function releaseLease(id) {
          await remoteFetch("/remote/v1/session/release", {
            method: "POST",
            body: JSON.stringify({ leaseId: id }),
          });
        }

        async function requestDesktopMode() {
          const currentLease = leaseId;
          if (currentLease) {
            await releaseLease(currentLease).catch(() => {});
            disconnect(false);
          }
          window.parent.postMessage({ type: "laymux:desktop-mode" }, "*");
        }

        function disconnect(clearStatus = true) {
          stopSocket();
          stopHeartbeat();
          stopInputFlush();
          stopResizeFlush();
          leaseId = null;
          activeTerminalId = null;
          setConnected(false);
          if (navigationState) renderNavigation(navigationState);
          if (clearStatus) {
            setConnectionHint("Connect first to load workspaces and control the active terminal.", false);
            setStatus("Disconnected.");
          }
        }

        function loseRemoteControl(message) {
          const lostLeaseId = leaseId;
          disconnect(false);
          terminalMetaEl.textContent = "Host has control.";
          setConnectionHint("Host has control. Connect again to request control.", true);
          setStatus(message, true);
          setNavigationOpen(true);
          if (lostLeaseId) releaseLease(lostLeaseId).catch(() => {});
        }

        emptyNav(workspaceListEl, "Not connected.");
        emptyNav(dockListEl, "Not connected.");
        emptyNav(notificationListEl, "Not connected.");
        setDockPanelOpen(false);
        setNotificationPanelOpen(false);
        setNavigationOpen(true);

        navToggleButton.addEventListener("click", () => {
          const open = navToggleButton.getAttribute("aria-expanded") !== "true";
          setNavigationOpen(open);
        });
        notificationToggleButton.addEventListener("click", () => {
          setNotificationPanelOpen(!notificationPanelOpen);
        });
        dockToggleButton.addEventListener("click", () => {
          setDockPanelOpen(!dockPanelOpen);
        });
        markAllNotificationsReadButton.addEventListener("click", () => {
          markAllNotificationsRead().catch((err) => setStatus(`Mark read failed: ${err.message}`, true));
        });
        clearNotificationsButton.addEventListener("click", () => {
          clearNotifications().catch((err) => setStatus(`Clear failed: ${err.message}`, true));
        });
        navCloseButton.addEventListener("click", () => setNavigationOpen(false));
        navScrim.addEventListener("click", () => setNavigationOpen(false));
        connectButton.addEventListener("click", () => connect().catch((err) => setStatus(err.message, true)));
        releaseButton.addEventListener("click", () => release().catch((err) => setStatus(`Release failed: ${err.message}`, true)));
        refreshButton.addEventListener("click", () => loadNavigation().catch((err) => setStatus(err.message, true)));
        copySelectionButton.addEventListener("click", () => copySelectionToClipboard());
        desktopModeHeaderButton.addEventListener("click", () => requestDesktopMode().catch((err) => setStatus(err.message, true)));
        desktopModeDrawerButton.addEventListener("click", () => requestDesktopMode().catch((err) => setStatus(err.message, true)));
        ctrlCButton.addEventListener("click", () => enqueueInput("\x03"));
        focusTerminalButton.addEventListener("click", () => terminal && terminal.focus());
        if (localAppMode && autoConnectMode && token()) {
          setTimeout(() => connect().catch((err) => setStatus(err.message, true)), 0);
        }
        window.addEventListener("beforeunload", () => {
          stopSocket();
          stopHeartbeat();
          stopInputFlush();
          if (resizeObserver) resizeObserver.disconnect();
        });
      })();
    </script>
  </body>
</html>
